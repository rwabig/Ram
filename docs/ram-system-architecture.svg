<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

<style>
.box { fill:#f9f9f9; stroke:#222; stroke-width:2; rx:10; ry:10; }
.title { font-size:20px; font-weight:bold; }
.label { font-size:14px; }
.layer { font-size:16px; font-weight:bold; }
.arrow { stroke:#222; stroke-width:2; marker-end:url(#arrowhead); }
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#222"/>
</marker>
</defs>

<text x="600" y="40" text-anchor="middle" class="title">RAM Infrastructure Architecture</text>

<!-- Internet Layer -->
<text x="60" y="110" class="layer">Public Internet</text>
<rect x="200" y="70" width="800" height="80" class="box"/>
<text x="600" y="110" text-anchor="middle" class="title">Edge Gateway</text>
<text x="600" y="135" text-anchor="middle" class="label">NGINX Reverse Proxy • TLS • Docker Auto‑Discovery</text>

<!-- Auth Layer -->
<text x="60" y="240" class="layer">Identity Layer</text>
<rect x="200" y="200" width="800" height="80" class="box"/>
<text x="600" y="240" text-anchor="middle" class="title">Authelia</text>
<text x="600" y="265" text-anchor="middle" class="label">SSO • MFA • Access Policies</text>

<!-- App Layer -->
<text x="60" y="380" class="layer">Application Layer</text>

<rect x="200" y="330" width="250" height="100" class="box"/>
<text x="325" y="370" text-anchor="middle" class="title">VS Code</text>
<text x="325" y="395" text-anchor="middle" class="label">Developer Workspaces</text>

<rect x="475" y="330" width="250" height="100" class="box"/>
<text x="600" y="370" text-anchor="middle" class="title">Agent Zero</text>
<text x="600" y="395" text-anchor="middle" class="label">Per‑User AI Containers</text>

<rect x="750" y="330" width="250" height="100" class="box"/>
<text x="875" y="370" text-anchor="middle" class="title">Application Platform</text>
<text x="875" y="395" text-anchor="middle" class="label">PHP • Apache • PostgreSQL</text>

<!-- Service Layer -->
<text x="60" y="520" class="layer">Internal Services</text>

<rect x="200" y="470" width="350" height="100" class="box"/>
<text x="375" y="510" text-anchor="middle" class="title">CoreDNS</text>
<text x="375" y="535" text-anchor="middle" class="label">Internal Service Discovery</text>

<rect x="650" y="470" width="350" height="100" class="box"/>
<text x="825" y="510" text-anchor="middle" class="title">WireGuard VPN</text>
<text x="825" y="535" text-anchor="middle" class="label">Private Infrastructure Network</text>

<!-- Arrows -->
<line x1="600" y1="150" x2="600" y2="200" class="arrow"/>
<line x1="600" y1="280" x2="600" y2="330" class="arrow"/>
<line x1="600" y1="430" x2="375" y2="470" class="arrow"/>
<line x1="600" y1="430" x2="825" y2="470" class="arrow"/>

</svg>
