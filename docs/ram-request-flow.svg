<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

<style>
.box { fill:#f9f9f9; stroke:#222; stroke-width:2; rx:10; ry:10; }
.title { font-size:18px; font-weight:bold; }
.label { font-size:13px; }
.arrow { stroke:#222; stroke-width:2; marker-end:url(#arrowhead); }
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#222"/>
</marker>
</defs>

<text x="600" y="40" text-anchor="middle" class="title">Request Flow Through RAM Infrastructure</text>

<rect x="50" y="200" width="180" height="90" class="box"/>
<text x="140" y="235" text-anchor="middle" class="title">User</text>
<text x="140" y="255" text-anchor="middle" class="label">Browser / SSH / IDE</text>

<rect x="300" y="200" width="200" height="90" class="box"/>
<text x="400" y="235" text-anchor="middle" class="title">Edge Gateway</text>
<text x="400" y="255" text-anchor="middle" class="label">TLS + Routing</text>

<rect x="550" y="200" width="200" height="90" class="box"/>
<text x="650" y="235" text-anchor="middle" class="title">Authelia</text>
<text x="650" y="255" text-anchor="middle" class="label">Login + MFA</text>

<rect x="800" y="150" width="200" height="90" class="box"/>
<text x="900" y="185" text-anchor="middle" class="title">VS Code</text>
<text x="900" y="205" text-anchor="middle" class="label">dev.example.com</text>

<rect x="800" y="300" width="200" height="90" class="box"/>
<text x="900" y="335" text-anchor="middle" class="title">Agent Zero</text>
<text x="900" y="355" text-anchor="middle" class="label">ai.example.com</text>

<line x1="230" y1="245" x2="300" y2="245" class="arrow"/>
<line x1="500" y1="245" x2="550" y2="245" class="arrow"/>
<line x1="750" y1="245" x2="800" y2="195" class="arrow"/>
<line x1="750" y1="245" x2="800" y2="345" class="arrow"/>

</svg>
