---
# ============================================================
# AGENT ZERO — RESTORE FROM BACKUP (PER USER)
#
# Restores a user's persisted Agent Zero data from a tar.gz created by
# 08-agent-zero-upgrade.yml (or equivalent).
#
# Run examples:
#   # Restore latest backup for user alice
#   ansible-playbook -i ansible/inventory/production.ini \
#     ansible/playbooks/10-agent-zero-restore.yml \
#     --ask-vault-pass -e a0_restore_user=alice
#
#   # Restore a specific backup file
#   ansible-playbook -i ansible/inventory/production.ini \
#     ansible/playbooks/10-agent-zero-restore.yml \
#     --ask-vault-pass -e a0_restore_user=alice -e a0_restore_backup='a0usr-20260228-120000.tar.gz'
#
# Notes:
# - The restore process stops only the target user's container.
# - A safety snapshot of current data is created before restore.
# ============================================================

- name: Restore Agent Zero user from backup
  hosts: agent_zero_servers
  become: true

  vars:
    a0_backup_root: "{{ agent_zero_base_path }}/backups"
    a0_safety_ts: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

  tasks:
    - name: Normalize restore inputs
      set_fact:
        a0_restore_user_resolved: "{{ a0_restore_user | default('', true) }}"
        a0_restore_backup_resolved: "{{ a0_restore_backup | default('', true) }}"

    - name: Validate inputs
      assert:
        that:
          - a0_restore_user_resolved | length > 0
        fail_msg: "Provide -e a0_restore_user=<username>"

    - name: Assert user exists in agent_zero_users
      assert:
        that:
          - a0_restore_user_resolved in (agent_zero_users | map(attribute='username') | list)
        fail_msg: "User {{ a0_restore_user_resolved }} not found in agent_zero_users"

    - name: Resolve backup file path (specific or latest)
      shell: |
        set -euo pipefail
        user_dir='{{ a0_backup_root }}/{{ a0_restore_user_resolved }}'
        if [ ! -d "$user_dir" ]; then
          echo "NO_BACKUP_DIR" >&2
          exit 2
        fi

        if [ -n '{{ a0_restore_backup_resolved | trim }}' ]; then
          if [ -f '{{ a0_restore_backup_resolved | trim }}' ]; then
            echo '{{ a0_restore_backup_resolved | trim }}'
            exit 0
          fi
          cand="$user_dir/{{ a0_restore_backup_resolved | trim }}"
          if [ -f "$cand" ]; then
            echo "$cand"
            exit 0
          fi
          echo "BACKUP_NOT_FOUND" >&2
          exit 3
        fi

        latest=$(ls -1t "$user_dir"/*.tar.gz 2>/dev/null | head -n 1 || true)
        if [ -z "$latest" ]; then
          echo "NO_BACKUPS" >&2
          exit 4
        fi
        echo "$latest"
      args:
        executable: /bin/bash
      register: a0_backup_resolved_cmd
      changed_when: false

    - name: Set restore backup path
      set_fact:
        a0_restore_backup_path: "{{ a0_backup_resolved_cmd.stdout | trim }}"

    - name: Stop target user container
      command: docker compose stop agent-zero-{{ a0_restore_user_resolved }}
      args:
        chdir: "{{ agent_zero_base_path }}"

    - name: Create safety snapshot of current data before restore
      vars:
        user_dir: "{{ agent_zero_base_path }}/{{ a0_restore_user_resolved }}"
        safety_dir: "{{ a0_backup_root }}/{{ a0_restore_user_resolved }}"
        safety_file: "{{ safety_dir }}/safety-before-restore-{{ a0_safety_ts }}.tar.gz"
      block:
        - name: Ensure safety directory exists
          file:
            path: "{{ safety_dir }}"
            state: directory
            mode: "0750"

        - name: Create safety tarball
          command: >-
            /bin/sh -lc
            "tar -czf '{{ safety_file }}' -C '{{ user_dir }}' usr .env"

    - name: Restore backup (extract into user directory)
      vars:
        user_dir: "{{ agent_zero_base_path }}/{{ a0_restore_user_resolved }}"
      command: >-
        /bin/sh -lc
        "tar -xzf '{{ a0_restore_backup_path }}' -C '{{ user_dir }}'"

    - name: Ensure permissions on user directory
      file:
        path: "{{ agent_zero_base_path }}/{{ a0_restore_user_resolved }}"
        state: directory
        recurse: true
        mode: "u=rwX,g=rX,o="

    - name: Start (recreate) target user container
      command: docker compose up -d --no-deps --force-recreate agent-zero-{{ a0_restore_user_resolved }}
      args:
        chdir: "{{ agent_zero_base_path }}"

    - name: Show restore summary
      debug:
        msg: "Restored {{ a0_restore_user_resolved }} from {{ a0_restore_backup_path }} (safety snapshot saved under {{ a0_backup_root }}/{{ a0_restore_user_resolved }})"
