---
# ============================================================
# WireGuard peer add/remove (one command onboarding)
#
# Usage examples:
#   ansible-playbook -i inventory/production.ini playbooks/09-wireguard-peer.yml \
#     -e wg_peer_action=add -e wg_peer_name=laptop3 --ask-vault-pass
#
#   ansible-playbook -i inventory/production.ini playbooks/09-wireguard-peer.yml \
#     -e wg_peer_action=add -e wg_peer_name=laptop3 -e wg_peer_ip=10.8.0.12 --ask-vault-pass
#
#   ansible-playbook -i inventory/production.ini playbooks/09-wireguard-peer.yml \
#     -e wg_peer_action=remove -e wg_peer_name=laptop3 --ask-vault-pass
# ============================================================

- hosts: wireguard_servers
  become: true

  # Self-contained defaults (vault/group_vars can override)
  vars:
    # WireGuard interface name
    wireguard_interface: "{{ wireguard_interface | default('wg0') }}"
    # Endpoint clients connect to (MUST be set in vault/group_vars)
    wireguard_endpoint: "{{ wireguard_endpoint | default('CHANGE_ME_VPN_ENDPOINT') }}"
    # Client routing policy
    wireguard_client_allowed_ips: "{{ wireguard_client_allowed_ips | default('10.8.0.0/24') }}"
    wireguard_client_persistent_keepalive: "{{ wireguard_client_persistent_keepalive | default(25) }}"

    # Server output paths
    wireguard_client_configs_dir: "{{ wireguard_client_configs_dir | default('/etc/wireguard/client-configs') }}"
    wireguard_qr_dir: "{{ wireguard_qr_dir | default('/etc/wireguard/client-qr') }}"

    # Fetch behavior
    wireguard_fetch_client_configs: "{{ wireguard_fetch_client_configs | default(true) }}"
    wireguard_generate_qr_codes: "{{ wireguard_generate_qr_codes | default(false) }}"
    wireguard_fetch_qr_codes: "{{ wireguard_fetch_qr_codes | default(true) }}"

    # Controller artifact paths (when running locally, these land on the server)
    wireguard_local_client_configs_dir: "{{ wireguard_local_client_configs_dir | default(playbook_dir ~ '/../artifacts/wireguard') }}"
    wireguard_local_qr_dir: "{{ wireguard_local_qr_dir | default(playbook_dir ~ '/../artifacts/wireguard-qr') }}"

  tasks:
    - name: Normalize inputs
      set_fact:
        wg_peer_action_norm: "{{ (wg_peer_action | default('add')) | lower | trim }}"
        wg_peer_name_norm: "{{ (wg_peer_name | default('')) | trim }}"
        wg_peer_ip_norm: "{{ (wg_peer_ip | default('')) | trim }}"

    - name: Validate inputs
      assert:
        that:
          - wg_peer_action_norm in ['add', 'remove']
          - wg_peer_name_norm | length > 0
          - wireguard_endpoint != 'CHANGE_ME_VPN_ENDPOINT'
        fail_msg: >-
          Provide -e wg_peer_action=add|remove and -e wg_peer_name=<name> [-e wg_peer_ip=10.8.0.X]
          AND set wireguard_endpoint in vault/group_vars (e.g. vpn.example.com:51820)

    - name: Ensure peer directories exist (server-side)
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - /etc/wireguard/peers
        - "{{ wireguard_client_configs_dir }}"
        - "{{ wireguard_qr_dir }}"
      when: wg_peer_action_norm == 'add'

    - name: Pick next free peer IP if not provided
      shell: |
        set -euo pipefail
        used=$(grep -E '^AllowedIPs\s*=\s*[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/32' -h /etc/wireguard/{{ wireguard_interface }}.conf 2>/dev/null \
          | awk -F'[ =/]+' '{print $3}' \
          | sort -u)

        # Choose next free in 10.8.0.10-10.8.0.250
        for i in $(seq 10 250); do
          cand="10.8.0.${i}"
          if ! echo "$used" | grep -qx "$cand"; then
            echo "$cand"
            exit 0
          fi
        done
        echo "NO_FREE_IP" >&2
        exit 1
      args:
        executable: /bin/bash
      register: wg_next_ip
      changed_when: false
      when:
        - wg_peer_action_norm == 'add'
        - wg_peer_ip_norm | length == 0

    - name: Set resolved peer IP
      set_fact:
        wg_peer_ip_resolved: >-
          {{
            (wg_peer_ip_norm | length > 0)
            | ternary(wg_peer_ip_norm, wg_next_ip.stdout)
            | trim
          }}
      when: wg_peer_action_norm == 'add'

    - name: Generate peer private key on server if missing
      command: /bin/sh -lc "umask 077 && wg genkey > /etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      args:
        creates: "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      when: wg_peer_action_norm == 'add'

    - name: Read peer private key
      slurp:
        src: "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      register: wg_peer_priv
      when: wg_peer_action_norm == 'add'

    - name: Set peer private key fact
      set_fact:
        wg_peer_private_key: "{{ wg_peer_priv.content | b64decode | trim }}"
      when: wg_peer_action_norm == 'add'

    - name: Derive peer public key
      command: /bin/sh -lc "echo '{{ wg_peer_private_key }}' | wg pubkey"
      register: wg_peer_pub
      changed_when: false
      when: wg_peer_action_norm == 'add'

    - name: Read server public key (from key file or active interface)
      shell: |
        set -euo pipefail
        if [ -f /etc/wireguard/{{ wireguard_interface }}.key ]; then
          cat /etc/wireguard/{{ wireguard_interface }}.key | wg pubkey
        else
          wg show {{ wireguard_interface }} public-key
        fi
      args:
        executable: /bin/bash
      register: wg_server_pub
      changed_when: false
      when: wg_peer_action_norm == 'add'

    - name: Add peer block to WireGuard config
      blockinfile:
        path: "/etc/wireguard/{{ wireguard_interface }}.conf"
        marker: "# {mark} PEER {{ wg_peer_name_norm }}"
        block: |
          [Peer]
          PublicKey = {{ wg_peer_pub.stdout | trim }}
          AllowedIPs = {{ wg_peer_ip_resolved }}/32
      notify: Restart WireGuard
      when: wg_peer_action_norm == 'add'

    - name: Remove peer block from WireGuard config
      blockinfile:
        path: "/etc/wireguard/{{ wireguard_interface }}.conf"
        marker: "# {mark} PEER {{ wg_peer_name_norm }}"
        state: absent
      notify: Restart WireGuard
      when: wg_peer_action_norm == 'remove'

    - name: Remove peer key and generated client artifacts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
        - "{{ wireguard_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        - "{{ wireguard_qr_dir }}/{{ wg_peer_name_norm }}.png"
      when: wg_peer_action_norm == 'remove'

    - name: Render WireGuard client config on server
      copy:
        dest: "{{ wireguard_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        mode: "0600"
        content: |
          [Interface]
          # {{ wg_peer_name_norm }}
          PrivateKey = {{ wg_peer_private_key }}
          Address = {{ wg_peer_ip_resolved }}/32

          [Peer]
          PublicKey = {{ wg_server_pub.stdout | trim }}
          Endpoint = {{ wireguard_endpoint }}
          AllowedIPs = {{ wireguard_client_allowed_ips }}
          PersistentKeepalive = {{ wireguard_client_persistent_keepalive }}
      when: wg_peer_action_norm == 'add'

    - name: Ensure qrencode installed when QR enabled
      apt:
        name: qrencode
        state: present
        update_cache: true
      when:
        - wg_peer_action_norm == 'add'
        - wireguard_generate_qr_codes | bool

    - name: Generate QR code (PNG) for this peer
      command: >-
        /bin/sh -lc "qrencode -t png -o '{{ wireguard_qr_dir }}/{{ wg_peer_name_norm }}.png' < '{{ wireguard_client_configs_dir }}/{{ wg_peer_name_norm }}.conf'"
      args:
        creates: "{{ wireguard_qr_dir }}/{{ wg_peer_name_norm }}.png"
      when:
        - wg_peer_action_norm == 'add'
        - wireguard_generate_qr_codes | bool

    - name: Ensure local artifacts directories exist
      delegate_to: localhost
      become: false
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ wireguard_local_client_configs_dir }}"
        - "{{ wireguard_local_qr_dir }}"
      when: wg_peer_action_norm == 'add'

    - name: Fetch client config to controller
      fetch:
        src: "{{ wireguard_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        dest: "{{ wireguard_local_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        flat: true
      when:
        - wg_peer_action_norm == 'add'
        - wireguard_fetch_client_configs | bool

    - name: Fetch QR code to controller
      fetch:
        src: "{{ wireguard_qr_dir }}/{{ wg_peer_name_norm }}.png"
        dest: "{{ wireguard_local_qr_dir }}/{{ wg_peer_name_norm }}.png"
        flat: true
      when:
        - wg_peer_action_norm == 'add'
        - wireguard_generate_qr_codes | bool
        - wireguard_fetch_qr_codes | bool

  handlers:
    - name: Restart WireGuard
      systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        state: restarted
