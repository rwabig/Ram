---
# ============================================================
# WireGuard peer add/remove (one command onboarding)
#
# Usage:
#   ansible-playbook -i inventory/production.ini playbooks/04a-wireguard-peer.yml \
#     -e wg_peer_action=add -e wg_peer_name=laptop3 --ask-vault-pass
#
#   ansible-playbook -i inventory/production.ini playbooks/04a-wireguard-peer.yml \
#     -e wg_peer_action=add -e wg_peer_name=laptop3 -e wg_peer_ip=10.8.0.12 --ask-vault-pass
#
#   ansible-playbook -i inventory/production.ini playbooks/04a-wireguard-peer.yml \
#     -e wg_peer_action=remove -e wg_peer_name=laptop3 --ask-vault-pass
# ============================================================

- hosts: wireguard_servers
  become: true
  vars_files:
    - "../group_vars/all/vault.yml"

  tasks:
    - name: Normalize inputs and set operational defaults
      set_fact:
        wg_peer_action_norm: "{{ (wg_peer_action | default('add')) | lower | trim }}"
        wg_peer_name_norm: "{{ (wg_peer_name | default('')) | trim }}"
        wg_peer_ip_norm: "{{ (wg_peer_ip | default('')) | trim }}"

        wg_interface: "{{ wireguard_interface | default('wg0') }}"
        wg_endpoint: "{{ wireguard_endpoint | default('CHANGE_ME_VPN_ENDPOINT') }}"
        wg_client_allowed_ips: "{{ wireguard_client_allowed_ips | default('10.8.0.0/24') }}"
        wg_keepalive: "{{ wireguard_client_persistent_keepalive | default(25) }}"

        wg_client_configs_dir: "{{ wireguard_client_configs_dir | default('/etc/wireguard/client-configs') }}"
        wg_qr_dir: "{{ wireguard_qr_dir | default('/etc/wireguard/client-qr') }}"

        wg_fetch_client_configs: "{{ wireguard_fetch_client_configs | default(true) }}"
        wg_generate_qr: "{{ wireguard_generate_qr_codes | default(false) }}"
        wg_fetch_qr: "{{ wireguard_fetch_qr_codes | default(true) }}"

        wg_local_client_configs_dir: "{{ wireguard_local_client_configs_dir | default(playbook_dir ~ '/../artifacts/wireguard') }}"
        wg_local_qr_dir: "{{ wireguard_local_qr_dir | default(playbook_dir ~ '/../artifacts/wireguard-qr') }}"

    - name: Validate inputs
      assert:
        that:
          - wg_peer_action_norm in ['add', 'remove']
          - wg_peer_name_norm | length > 0
          - wg_endpoint != 'CHANGE_ME_VPN_ENDPOINT'
        fail_msg: >-
          Provide -e wg_peer_action=add|remove and -e wg_peer_name=<name> [-e wg_peer_ip=10.8.0.X]
          AND set wireguard_endpoint in vault/group_vars (e.g. vpn.example.com:51820)

    - name: Ensure peer directories exist (server-side)
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - /etc/wireguard/peers
        - "{{ wg_client_configs_dir }}"
        - "{{ wg_qr_dir }}"
      when: wg_peer_action_norm == 'add'

    - name: Pick next free peer IP if not provided
      shell: |
        set -euo pipefail

        used=$(
          (grep -E '^AllowedIPs\s*=\s*[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/32' -h /etc/wireguard/{{ wg_interface }}.conf 2>/dev/null || true) \
          | awk -F'[ =/]+' '{print $3}' \
          | sort -u
        )

        for i in $(seq 10 250); do
          cand="10.8.0.${i}"
          if ! echo "$used" | grep -qx "$cand"; then
            echo "$cand"
            exit 0
          fi
        done
        echo "NO_FREE_IP" >&2
        exit 1
      args:
        executable: /bin/bash
      register: wg_next_ip
      changed_when: false
      when:
        - wg_peer_action_norm == 'add'
        - wg_peer_ip_norm | length == 0

    - name: Set resolved peer IP
      set_fact:
        wg_peer_ip_resolved: >-
          {{
            (wg_peer_ip_norm | length > 0)
            | ternary(wg_peer_ip_norm, wg_next_ip.stdout)
            | trim
          }}
      when: wg_peer_action_norm == 'add'

    - name: Generate peer private key on server if missing
      command: /bin/sh -lc "umask 077 && wg genkey > /etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      args:
        creates: "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      when: wg_peer_action_norm == 'add'

    - name: Read peer private key
      slurp:
        src: "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
      register: wg_peer_priv
      when: wg_peer_action_norm == 'add'

    - name: Set peer private key fact
      set_fact:
        wg_peer_private_key: "{{ wg_peer_priv.content | b64decode | trim }}"
      when: wg_peer_action_norm == 'add'

    - name: Derive peer public key
      command: /bin/sh -lc "echo '{{ wg_peer_private_key }}' | wg pubkey"
      register: wg_peer_pub
      changed_when: false
      when: wg_peer_action_norm == 'add'

    - name: Read server public key (from key file or active interface)
      shell: |
        set -euo pipefail
        if [ -f /etc/wireguard/{{ wg_interface }}.key ]; then
          cat /etc/wireguard/{{ wg_interface }}.key | wg pubkey
        else
          wg show {{ wg_interface }} public-key
        fi
      args:
        executable: /bin/bash
      register: wg_server_pub
      changed_when: false
      when: wg_peer_action_norm == 'add'

    - name: Add peer block to WireGuard config
      blockinfile:
        path: "/etc/wireguard/{{ wg_interface }}.conf"
        marker: "# {mark} PEER {{ wg_peer_name_norm }}"
        block: |
          [Peer]
          PublicKey = {{ wg_peer_pub.stdout | trim }}
          AllowedIPs = {{ wg_peer_ip_resolved }}/32
      notify: Restart WireGuard
      when: wg_peer_action_norm == 'add'

    - name: Remove peer block from WireGuard config
      blockinfile:
        path: "/etc/wireguard/{{ wg_interface }}.conf"
        marker: "# {mark} PEER {{ wg_peer_name_norm }}"
        state: absent
      notify: Restart WireGuard
      when: wg_peer_action_norm == 'remove'

    - name: Remove peer key and generated client artifacts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/etc/wireguard/peers/{{ wg_peer_name_norm }}.key"
        - "{{ wg_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        - "{{ wg_qr_dir }}/{{ wg_peer_name_norm }}.png"
      when: wg_peer_action_norm == 'remove'

    - name: Render WireGuard client config on server
      copy:
        dest: "{{ wg_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        mode: "0600"
        content: |
          [Interface]
          # {{ wg_peer_name_norm }}
          PrivateKey = {{ wg_peer_private_key }}
          Address = {{ wg_peer_ip_resolved }}/32
          {{ ('DNS = ' ~ wireguard_client_dns) if (wireguard_client_dns is defined and (wireguard_client_dns | string | length > 0)) else '' }}

          [Peer]
          PublicKey = {{ wg_server_pub.stdout | trim }}
          Endpoint = {{ wg_endpoint }}
          AllowedIPs = {{ wg_client_allowed_ips }}
          PersistentKeepalive = {{ wg_keepalive }}
      when: wg_peer_action_norm == 'add'

    - name: Ensure qrencode installed when QR enabled
      apt:
        name: qrencode
        state: present
        update_cache: true
      when:
        - wg_peer_action_norm == 'add'
        - wg_generate_qr | bool

    - name: Generate QR code (PNG) for this peer
      command: >-
        /bin/sh -lc "qrencode -t png -o '{{ wg_qr_dir }}/{{ wg_peer_name_norm }}.png' < '{{ wg_client_configs_dir }}/{{ wg_peer_name_norm }}.conf'"
      args:
        creates: "{{ wg_qr_dir }}/{{ wg_peer_name_norm }}.png"
      when:
        - wg_peer_action_norm == 'add'
        - wg_generate_qr | bool

    - name: Ensure local artifacts directories exist
      delegate_to: localhost
      become: false
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ wg_local_client_configs_dir }}"
        - "{{ wg_local_qr_dir }}"
      when: wg_peer_action_norm == 'add'

    - name: Fetch client config to controller
      fetch:
        src: "{{ wg_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        dest: "{{ wg_local_client_configs_dir }}/{{ wg_peer_name_norm }}.conf"
        flat: true
      when:
        - wg_peer_action_norm == 'add'
        - wg_fetch_client_configs | bool
        - ansible_connection != 'local'

    - name: Fetch QR code to controller
      fetch:
        src: "{{ wg_qr_dir }}/{{ wg_peer_name_norm }}.png"
        dest: "{{ wg_local_qr_dir }}/{{ wg_peer_name_norm }}.png"
        flat: true
      when:
        - wg_peer_action_norm == 'add'
        - wg_generate_qr | bool
        - wg_fetch_qr | bool
        - ansible_connection != 'local'

  handlers:
    - name: Restart WireGuard
      systemd:
        name: "wg-quick@{{ wg_interface }}"
        state: restarted
