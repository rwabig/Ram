---
# ============================================================
# AUTHELIA DEPLOYMENT
# ============================================================

- name: Ensure base directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ authelia_base_path }}"
    - "{{ authelia_base_path }}/config"
    - "{{ authelia_base_path }}/data"

- name: Ensure edge network exists
  community.docker.docker_network:
    name: "{{ authelia_network }}"

# ------------------------------------------------------------
# Dynamic access-control generation helper
# ------------------------------------------------------------

- name: Install Authelia access-control render helper
  copy:
    src: render_access_control.py
    dest: /usr/local/bin/render_access_control.py
    mode: "0755"

- name: Ensure generated rules directory exists
  file:
    path: "{{ authelia_generated_rules_file | dirname }}"
    state: directory
    mode: "0755"

- name: Ensure watcher domains file exists
  file:
    path: "{{ authelia_domains_file }}"
    state: touch
    mode: "0644"

- name: Render generated Authelia access-control fragment
  command: >
    python3 /usr/local/bin/render_access_control.py
    --domains-file {{ authelia_domains_file }}
    --output-file {{ authelia_generated_rules_file }}
    --auth-domain {{ authelia_domain }}
    --base-domain {{ authelia_base_domain }}
  changed_when: false

- name: Read generated Authelia access-control fragment
  slurp:
    src: "{{ authelia_generated_rules_file }}"
  register: authelia_generated_rules_raw

- name: Set generated Authelia access-control content
  set_fact:
    authelia_generated_rules: "{{ authelia_generated_rules_raw.content | b64decode }}"

# ------------------------------------------------------------
# Render configuration
# ------------------------------------------------------------

- name: Render Authelia configuration.yml
  template:
    src: configuration.yml.j2
    dest: "{{ authelia_base_path }}/config/configuration.yml"
    mode: "0644"
  notify: Restart Authelia stack

- name: Render Authelia users_database.yml
  template:
    src: users_database.yml.j2
    dest: "{{ authelia_base_path }}/config/users_database.yml"
    mode: "0644"
  notify: Restart Authelia stack

- name: Render Authelia docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ authelia_base_path }}/docker-compose.yml"
    mode: "0644"
  notify: Restart Authelia stack

- name: Start Authelia stack
  command: docker compose up -d
  args:
    chdir: "{{ authelia_base_path }}"

# ============================================================
# EDGE GATEWAY INTEGRATION
# Create auth_domain file consumed by the Edge Watcher.
# ============================================================

- name: Ensure edge watcher scripts directory exists
  file:
    path: "{{ edge_gateway_base_path | default('/opt/edge-gateway') }}/scripts"
    state: directory
    mode: "0755"

- name: Write Authelia auth domain for Edge Watcher
  copy:
    content: "{{ authelia_domain }}\n"
    dest: "{{ edge_gateway_base_path | default('/opt/edge-gateway') }}/scripts/auth_domain"
    mode: "0644"
  notify: Restart Edge Watcher
