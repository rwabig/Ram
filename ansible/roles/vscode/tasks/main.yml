---
# ============================================================
# VS CODE — MULTI-TENANT DEPLOYMENT
# ============================================================

- name: Assert user list is provided
  assert:
    that:
      - vscode_users | length > 0
    fail_msg: "vscode_users is empty. Define at least one VS Code user."

- name: Ensure vscode base directory exists
  file:
    path: "{{ vscode_base_path }}"
    state: directory
    mode: "0755"

- name: Ensure edge network exists
  community.docker.docker_network:
    name: "{{ edge_gateway_network }}"

- name: Ensure per-user root directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}"
    state: directory
    mode: "0755"
  loop: "{{ vscode_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Ensure per-user workspace directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}/workspace"
    state: directory
    mode: "0755"
  loop: "{{ vscode_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Ensure per-user config directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}/config"
    state: directory
    mode: "0755"
  loop: "{{ vscode_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Render vscode docker compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ vscode_base_path }}/docker-compose.yml"
    mode: "0644"

- name: Start vscode stack
  command: docker compose up -d
  args:
    chdir: "{{ vscode_base_path }}"
