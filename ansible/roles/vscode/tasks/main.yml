---
- name: Ensure vscode base directory exists
  file:
    path: "{{ vscode_base_path }}"
    state: directory
    mode: "0755"

- name: Build effective VS Code user list
  set_fact:
    vscode_effective_users: >-
      {{
        vscode_users
        if (vscode_users | length > 0)
        else [ {
          'username': vscode_container_name,
          'domain': vscode_domain,
          'password': vscode_default_password
        } ]
      }}

- name: Ensure per-user root directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}"
    state: directory
    mode: "0755"
  loop: "{{ vscode_effective_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Ensure per-user workspace directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}/workspace"
    state: directory
    mode: "0755"
  loop: "{{ vscode_effective_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Ensure per-user config directory exists
  file:
    path: "{{ vscode_base_path }}/{{ item.username }}/config"
    state: directory
    mode: "0755"
  loop: "{{ vscode_effective_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Render vscode docker compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ vscode_base_path }}/docker-compose.yml"
    mode: "0644"

- name: Start vscode stack
  command: docker compose up -d
  args:
    chdir: "{{ vscode_base_path }}"
  changed_when: false

- name: Ensure edge apps directory exists
  file:
    path: "{{ edge_gateway_base_path }}/apps"
    state: directory
    mode: "0755"
