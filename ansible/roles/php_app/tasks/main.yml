---
- name: Create app directory
  file:
    path: "{{ app_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure GitHub is in known_hosts
  known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
    path: /root/.ssh/known_hosts

- name: Ensure edge gateway network exists
  community.docker.docker_network:
    name: "{{ edge_gateway_network }}"

- name: Ensure app network exists
  community.docker.docker_network:
    name: "{{ app_network }}"

- name: Clone or update app repository
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_root }}"
    version: "{{ app_branch }}"
    force: true

- name: Copy Dockerfile template
  template:
    src: Dockerfile.j2
    dest: "{{ app_root }}/Dockerfile"
    mode: "0644"

- name: Build PHP image
  community.docker.docker_image:
    name: "{{ app_image_name }}"
    source: build
    force_source: true
    build:
      path: "{{ app_root }}"
      pull: true

- name: Build edge labels for PHP app
  set_fact:
    php_app_edge_labels: >-
      {{
        {
          'edge.enable': 'true',
          'edge.domain': app_domain,
          'edge.port': '80'
        }
        | combine(
            (app_enable_edge_auth | default(false) | bool)
            | ternary({'edge.auth': 'authelia'}, {})
          )
      }}

- name: Run PHP container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ app_image_name }}"
    recreate: true
    restart_policy: unless-stopped
    networks_cli_compatible: true
    networks:
      - name: "{{ edge_gateway_network }}"
      - name: "{{ app_network }}"
    env:
      DB_HOST: "{{ db_container_name }}"
      DB_PORT: "{{ db_port }}"
      DB_NAME: "{{ db_name }}"
      DB_USER: "{{ db_user }}"
      DB_PASS: "{{ db_password }}"
    labels: "{{ php_app_edge_labels }}"
    state: started

# ============================================================
# EDGE REGISTRATION (AUTO DISCOVERY - LEGACY FALLBACK)
# ============================================================

- name: Ensure edge apps directory exists
  file:
    path: "{{ edge_gateway_base_path }}/apps"
    state: directory
    mode: "0755"

# ============================================================
# FUTURE AUTOMATION HOOK (DISABLED)
# ============================================================

- name: Trigger edge rebuild
  command: ansible-playbook playbooks/02-edge-gateway.yml
  when: false
