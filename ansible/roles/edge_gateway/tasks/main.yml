---
# ============================================================
# EDGE GATEWAY — CORE DIRECTORIES
# ============================================================

- name: Create edge gateway base directory
  file:
    path: "{{ edge_gateway_base_path }}"
    state: directory
    mode: "0755"

- name: Create nginx base directory
  file:
    path: "{{ edge_gateway_base_path }}/nginx"
    state: directory
    mode: "0755"

- name: Create nginx sites directory (mounted as conf.d)
  file:
    path: "{{ edge_gateway_base_path }}/nginx/sites"
    state: directory
    mode: "0755"

- name: Create certbot directories
  file:
    path: "{{ edge_gateway_base_path }}/certbot/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - conf
    - www

- name: Create edge scripts directory
  file:
    path: "{{ edge_gateway_base_path }}/scripts"
    state: directory
    mode: "0755"

- name: Create edge app registry directory
  file:
    path: "{{ edge_gateway_base_path }}/apps"
    state: directory
    mode: "0755"

# ============================================================
# DOCKER NETWORK
# ============================================================

- name: Ensure edge docker network exists
  community.docker.docker_network:
    name: "{{ edge_gateway_network }}"

# ============================================================
# LEGACY / BOOTSTRAP DISCOVERY
#
# This discovery is kept for backward compatibility and bootstrap
# certificate handling for explicitly-labeled containers using:
#   edge.enable=true
#   edge.domain=<fqdn>
#   edge.port=<port>
#
# Ongoing autonomous routing, tenant-derived domains, and automatic
# certificate issuance are handled by edge-watcher (watch.sh).
# ============================================================

- name: Get running container IDs
  command: docker ps -q
  register: running_containers
  changed_when: false

- name: Initialize legacy bootstrap app list
  set_fact:
    edge_gateway_apps_dynamic: []

- name: Inspect running containers
  command: docker inspect {{ item }}
  register: container_inspect
  loop: "{{ running_containers.stdout_lines }}"
  changed_when: false

- name: Build legacy bootstrap edge app list from explicit docker labels
  set_fact:
    edge_gateway_apps_dynamic: "{{ edge_gateway_apps_dynamic + [ {
        'domain': container.Config.Labels['edge.domain'],
        'upstream': (container.Name | regex_replace('^/', '')) ~ ':' ~ container.Config.Labels['edge.port']
      } ] }}"
  vars:
    container: "{{ item.stdout | from_json | first }}"
  loop: "{{ container_inspect.results }}"
  when:
    - item.stdout is defined
    - container.Config.Labels is defined
    - container.Config.Labels['edge.enable'] is defined
    - container.Config.Labels['edge.enable'] == "true"
    - container.Config.Labels['edge.domain'] is defined
    - container.Config.Labels['edge.domain'] | length > 0
    - container.Config.Labels['edge.port'] is defined
    - container.Config.Labels['edge.port'] | length > 0

- name: Validate discovered legacy bootstrap apps
  assert:
    that:
      - edge_gateway_apps_dynamic | length > 0
    fail_msg: "No containers found with explicit edge.enable=true + edge.domain labels"
    quiet: true
  ignore_errors: true

- name: Remove duplicate legacy bootstrap apps
  set_fact:
    edge_gateway_apps_dynamic: "{{ edge_gateway_apps_dynamic | unique(attribute='domain') }}"

# ============================================================
# CLEAN OLD SITE CONFIGS
#
# The watcher is the source of truth for generated site configs.
# Cleaning here ensures a fresh base before the stack starts.
# ============================================================

- name: Discover existing nginx site configs
  find:
    paths: "{{ edge_gateway_base_path }}/nginx/sites"
    patterns: "*.conf"
    file_type: file
  register: existing_nginx_configs

- name: Remove old generated site configs
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_nginx_configs.files }}"

# ============================================================
# CONFIGURATION FILES
# ============================================================

- name: Render edge gateway docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ edge_gateway_base_path }}/docker-compose.yml"
    mode: "0644"

- name: Render global nginx.conf
  template:
    src: nginx.conf.j2
    dest: "{{ edge_gateway_base_path }}/nginx/nginx.conf"
    mode: "0644"
  notify: Reload edge nginx

# ============================================================
# LEGACY TLS SCRIPTS
#
# These scripts are preserved for backward compatibility and
# manual/bootstrap use. New tenant certificates are expected to be
# issued automatically by edge-watcher.
# ============================================================

- name: Install legacy TLS bootstrap script
  template:
    src: init-letsencrypt.sh.j2
    dest: "{{ edge_gateway_base_path }}/init-letsencrypt.sh"
    mode: "0755"

- name: Install legacy TLS renewal script
  template:
    src: renew-certs.sh.j2
    dest: "{{ edge_gateway_base_path }}/renew-certs.sh"
    mode: "0755"

# ============================================================
# START STACK
# ============================================================

- name: Start Edge Gateway stack
  command: docker compose up -d --force-recreate
  args:
    chdir: "{{ edge_gateway_base_path }}"

# ============================================================
# HEALTH CHECK
# ============================================================

- name: Wait for edge nginx container to exist
  command: docker inspect edge-nginx
  register: edge_exists
  retries: 10
  delay: 2
  until: edge_exists.rc == 0
  changed_when: false

- name: Wait for edge nginx to become healthy
  command: docker inspect --format='{{ "{{.State.Health.Status}}" }}' edge-nginx
  register: edge_health
  retries: 20
  delay: 3
  until: edge_health.stdout == "healthy"
  changed_when: false
  failed_when: edge_health.stdout != "healthy"

# ============================================================
# OPTIONAL LEGACY TLS BOOTSTRAP
#
# This only applies to explicitly discovered edge.domain entries.
# New watcher-managed tenant domains should rely on automatic
# certificate issuance from watch.sh.
# ============================================================

- name: Check if legacy bootstrap certificate exists
  stat:
    path: "{{ edge_gateway_base_path }}/certbot/conf/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ edge_gateway_apps_dynamic }}"
  register: edge_tls_stats
  when: edge_gateway_apps_dynamic | length > 0

- name: Bootstrap legacy TLS certificates
  command: "{{ edge_gateway_base_path }}/init-letsencrypt.sh {{ item.item.domain }}"
  args:
    chdir: "{{ edge_gateway_base_path }}"
  loop: "{{ edge_tls_stats.results }}"
  when:
    - edge_gateway_apps_dynamic | length > 0
    - not item.stat.exists

- name: Install certificate renewal cron
  cron:
    name: "Edge Gateway TLS renewal"
    minute: "0"
    hour: "3"
    job: "{{ edge_gateway_base_path }}/renew-certs.sh"

# ============================================================
# WATCHER INSTALL
#
# The watcher is the primary automation engine for:
# - route generation
# - tenant-derived domains
# - automatic certificate issuance
# - Authelia protected-domain registration
# ============================================================

- name: Install edge watcher script
  copy:
    src: watch.sh
    dest: "{{ edge_gateway_base_path }}/scripts/watch.sh"
    mode: "0755"
