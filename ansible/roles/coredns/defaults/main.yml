---
# ============================================================
# COREDNS — INTERNAL DNS OVER WIREGUARD
# ============================================================

coredns_base_path: "/opt/coredns"
coredns_image: "coredns/coredns:latest"
coredns_network: "{{ edge_gateway_network | default('edge-net') }}"

# Internal DNS should resolve private app domains to the edge gateway.
# The edge gateway itself is reachable over WireGuard at 10.8.0.1.
coredns_bind_ip: "10.8.0.1"
coredns_port: 53

# Upstream resolvers for non-private names.
coredns_forwarders:
  - "1.1.1.1"
  - "8.8.8.8"

# Internal base domain.
coredns_root_domain: "unifypesacard.shop"

# Static internal app names that should always resolve to the edge gateway.
coredns_static_domains:
  - "cgs.unifypesacard.shop"
  - "auth.unifypesacard.shop"

# Wildcard internal app zones that should automatically resolve to the edge gateway.
# New tenants work without DNS edits as long as routing labels exist in edge-nginx.
coredns_wildcard_zones:
  - "*.dev.unifypesacard.shop"
  - "*.a0.unifypesacard.shop"

# Restrict DNS access to VPN clients only.
coredns_manage_ufw: true
coredns_allow_from_cidr: "{{ wireguard_network_cidr | default('10.8.0.0/24') }}"
